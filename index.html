<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CampusSafe — Intelligent Campus Safety & Incident Response</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #0B1F3A; --blue: #2563EB; --blue-pale: #DBEAFE;
    --red: #EF4444; --red-pale: #FEE2E2; --green: #10B981;
    --green-pale: #D1FAE5; --surface: #F8FAFC; --border: rgba(15,30,60,0.1);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--surface); font-size: 14px; }
  .navbar { position: sticky; top: 0; z-index: 50; background: var(--navy); padding: 0 1.5rem; display: flex; align-items: center; height: 60px; color: white; justify-content: space-between; }
  .nav-tabs { display: flex; gap: 10px; }
  .nav-tab { padding: 8px 16px; border-radius: 8px; cursor: pointer; opacity: 0.6; transition: 0.3s; }
  .nav-tab.active { opacity: 1; background: rgba(255,255,255,0.1); }
  .view { display: none; padding: 2rem; max-width: 1200px; margin: 0 auto; }
  .view.active { display: block; }
  .card { background: white; border: 1px solid var(--border); border-radius: 12px; padding: 24px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
  .cat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 10px; margin: 15px 0; }
  .cat-btn { padding: 12px; border: 1px solid var(--border); border-radius: 8px; text-align: center; cursor: pointer; transition: 0.2s; background: white; }
  .cat-btn.selected { border-color: var(--blue); background: var(--blue-pale); color: var(--blue); font-weight: bold; }
  .btn-primary { background: var(--blue); color: white; padding: 12px; border-radius: 8px; border: none; width: 100%; font-weight: bold; cursor: pointer; margin-top: 10px; }
  .admin-grid { display: grid; grid-template-columns: 1.5fr 1fr; gap: 24px; }
  .inc-card { background: white; padding: 16px; border-radius: 10px; border: 1px solid var(--border); margin-bottom: 12px; border-left: 6px solid #ccc; }
  .map-area { background: #e2e8f0; height: 450px; border-radius: 15px; position: relative; border: 2px solid #cbd5e1; overflow: hidden; }
  .hotspot { position: absolute; border-radius: 50%; opacity: 0.6; transform: translate(-50%, -50%); transition: 0.5s; pointer-events: none; }
  .map-label { position: absolute; font-size: 9px; color: #64748b; font-weight: bold; transform: translate(-50%, 5px); }
  input, select, textarea { width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: 8px; margin: 8px 0 16px; }
</style>
</head>
<body>

<nav class="navbar">
  <div style="font-weight:bold; font-size:18px">🛡️ CampusSafe</div>
  <div class="nav-tabs">
    <div class="nav-tab active" id="tab-report" onclick="showView('report')">Report Incident</div>
    <div class="nav-tab" id="tab-admin" onclick="showView('admin')">Admin Dashboard</div>
  </div>
</nav>

<div class="view active" id="view-report">
  <div style="max-width: 650px; margin: 0 auto;">
    <h2 style="margin-bottom:20px">New Incident Report</h2>
    <div class="card">
      <label><b>1. Select Category</b></label>
      <div class="cat-grid">
        <div class="cat-btn" onclick="selectCat(this, 'Emergency')">🚨 Emergency</div>
        <div class="cat-btn" onclick="selectCat(this, 'Harassment')">🚫 Harassment</div>
        <div class="cat-btn" onclick="selectCat(this, 'Safety')">⚠️ Safety</div>
        <div class="cat-btn" onclick="selectCat(this, 'Infrastructure')">🛠️ Infrastructure</div>
        <div class="cat-btn" onclick="selectCat(this, 'Lost')">📦 Lost Item</div>
        <div class="cat-btn" onclick="selectCat(this, 'Suspicious')">👁️ Suspicious</div>
      </div>

      <label><b>2. Report Settings</b></label>
      <div style="margin: 10px 0"><input type="checkbox" id="isAnon" style="width:auto"> Report Anonymously</div>
      
      <label>Reporter Name / ID</label>
      <input type="text" id="reporterName" placeholder="Enter Name or ID (Ignored if anonymous)">

      <label>Incident Title</label>
      <input type="text" id="title" placeholder="Brief summary (e.g., Water leakage)">

      <label>Location</label>
      <select id="loc">
        <option value="">-- Choose Location --</option>
        <option>MAIN GATE</option><option>ACADEMIC BLOCK 1</option><option>LIBRARY</option>
        <option>CAFETERIA</option><option>LAWN AREA</option><option>ACADEMIC BLOCK 2</option>
        <option>PREKSHA AUDITORIUM</option><option>BHARATHI AUDITORIUM</option>
        <option>FOOD COURT</option><option>GYM</option><option>LAUNDRY</option>
        <option>TEMPLE</option><option>FACULTY HOUSING</option><option>GUEST HOUSING</option>
        <option>BOYS HOSTEL</option><option>GIRLS HOSTEL</option><option>MINI MART</option>
        <option>SALON</option><option>CRICKET GROUND</option><option>BASKETBALL COURT</option>
        <option>FLAGPOST</option><option>KONARK WHEEL</option>
      </select>

      <label>Description</label>
      <textarea id="desc" rows="3" placeholder="Provide more details..."></textarea>

      <label>Urgency Level (1-5)</label>
      <input type="range" id="urgency" min="1" max="5" value="3">

      <button class="btn btn-primary" onclick="submitReport()">Submit Secure Report</button>
    </div>
  </div>
</div>

<div class="view" id="view-admin">
  <div class="admin-grid">
    <div>
      <h2 style="margin-bottom:20px">Live Response Feed</h2>
      <div id="incident-list"></div>
    </div>
    <div>
      <h2 style="margin-bottom:20px">Campus Hotspot Map</h2>
      <div class="map-area" id="map-area"></div>
      <p style="font-size:11px; color:#666; margin-top:10px">Red circles indicate incident frequency and urgency.</p>
      <button onclick="localStorage.clear(); location.reload();" style="margin-top:20px; color:red; cursor:pointer; border:none; background:none; font-size:12px">Clear System Data</button>
    </div>
  </div>
</div>

<script>
  // Dynamic Spatial Mapping for your 22 locations
  const coords = {
    "MAIN GATE": [10, 50], "ACADEMIC BLOCK 1": [25, 30], "LIBRARY": [25, 70],
    "CAFETERIA": [40, 50], "LAWN AREA": [40, 30], "ACADEMIC BLOCK 2": [40, 70],
    "PREKSHA AUDITORIUM": [55, 20], "BHARATHI AUDITORIUM": [55, 80],
    "FOOD COURT": [70, 50], "GYM": [85, 20], "LAUNDRY": [85, 40],
    "TEMPLE": [10, 80], "FACULTY HOUSING": [10, 20], "GUEST HOUSING": [25, 10],
    "BOYS HOSTEL": [70, 80], "GIRLS HOSTEL": [85, 80], "MINI MART": [70, 20],
    "SALON": [85, 60], "CRICKET GROUND": [50, 50], "BASKETBALL COURT": [60, 40],
    "FLAGPOST": [5, 50], "KONARK WHEEL": [45, 45]
  };

  let reports = JSON.parse(localStorage.getItem('campus_reports')) || [];
  let selectedCategory = "";

  function showView(v) {
    document.querySelectorAll('.view').forEach(e => e.classList.remove('active'));
    document.querySelectorAll('.nav-tab').forEach(e => e.classList.remove('active'));
    document.getElementById('view-'+v).classList.add('active');
    document.getElementById('tab-'+v).classList.add('active');
    if(v === 'admin') renderAdmin();
  }

  function selectCat(el, cat) {
    document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('selected'));
    el.classList.add('selected');
    selectedCategory = cat;
  }

  function submitReport() {
    const isAnon = document.getElementById('isAnon').checked;
    const report = {
      id: 'R-' + Math.floor(Math.random()*9000 + 1000),
      cat: selectedCategory,
      title: document.getElementById('title').value,
      desc: document.getElementById('desc').value,
      location: document.getElementById('loc').value,
      urgency: parseInt(document.getElementById('urgency').value),
      reporter: isAnon ? "Identity Masked" : (document.getElementById('reporterName').value || "Unknown"),
      status: 'Open',
      ts: new Date().toLocaleTimeString()
    };

    if(!report.cat || !report.title || !report.location) return alert("Please fill all required fields!");

    // LEVEL 6 LOGIC: Weighted Priority Algorithm
    const weights = { Emergency: 60, Harassment: 50, Safety: 30, Infrastructure: 15, Suspicious: 25, Lost: 5 };
    const frequency = reports.filter(r => r.location === report.location && r.status === 'Open').length;
    report.priority = weights[report.cat] + (report.urgency * 10) + (frequency * 15);

    reports.push(report);
    localStorage.setItem('campus_reports', JSON.stringify(reports));
    alert("Incident Logged Successfully!");
    showView('admin');
  }

  function renderAdmin() {
    const list = document.getElementById('incident-list');
    const map = document.getElementById('map-area');
    
    // Sort by Priority Score (Requirement 11)
    reports.sort((a,b) => b.priority - a.priority);

    list.innerHTML = reports.map(r => `
      <div class="inc-card" style="border-left-color: ${r.priority > 80 ? '#EF4444' : r.priority > 50 ? '#F59E0B' : '#3B82F6'}">
        <div style="display:flex; justify-content:space-between; align-items:start">
          <h4 style="margin-bottom:5px">${r.cat}: ${r.title}</h4>
          <span style="font-size:10px; font-weight:bold; color:#666">SCORE: ${r.priority}</span>
        </div>
        <p style="font-size:12px; color:#444; margin-bottom:8px">${r.desc}</p>
        <div style="font-size:11px; color:#888; display:flex; justify-content:space-between">
          <span>📍 ${r.location} | 👤 ${r.reporter}</span>
          <span>${r.ts}</span>
        </div>
        ${r.status === 'Open' ? `<button onclick="resolve('${r.id}')" style="margin-top:10px; color:green; border:none; background:none; cursor:pointer; font-weight:bold">✓ Mark Resolved</button>` : '<b style="color:green; font-size:11px">Resolved</b>'}
      </div>
    `).join('');

    // RENDER HOTSPOT MAP (Requirement 14)
    map.innerHTML = Object.entries(coords).map(([name, pos]) => {
      const activeReports = reports.filter(r => r.location === name && r.status === 'Open');
      if (activeReports.length === 0) return `<div class="map-label" style="top:${pos[0]}%; left:${pos[1]}%">${name}</div>`;
      
      const intensity = Math.min(activeReports.length * 15 + 20, 80);
      return `
        <div class="hotspot" style="top:${pos[0]}%; left:${pos[1]}%; width:${intensity}px; height:${intensity}px; background:rgba(239,68,68,0.5); border: 2px solid #EF4444"></div>
        <div class="map-label" style="top:${pos[0]}%; left:${pos[1]}%; color:#000">${name}</div>
      `;
    }).join('');
  }

  function resolve(id) {
    reports = reports.map(r => r.id === id ? {...r, status: 'Resolved', priority: 0} : r);
    localStorage.setItem('campus_reports', JSON.stringify(reports));
    renderAdmin();
  }
</script>
</body>
</html>
