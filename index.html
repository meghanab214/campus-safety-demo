<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SafeCampus | Intelligent Incident Response</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 font-sans">

    <nav class="bg-blue-900 text-white p-4 shadow-lg flex justify-between">
        <h1 class="font-bold text-xl">🛡️ SafeCampus</h1>
        <div>
            <button onclick="showPage('student')" class="px-4 py-2 hover:bg-blue-800 rounded">Report Incident</button>
            <button onclick="showPage('admin')" class="px-4 py-2 hover:bg-blue-800 rounded">Admin Dashboard</button>
        </div>
    </nav>

    <section id="student-page" class="max-w-2xl mx-auto mt-10 p-6 bg-white rounded-xl shadow-md">
        <h2 class="text-2xl font-bold mb-6 text-gray-800">Report an Incident</h2>
        <form id="incidentForm" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700">Category</label>
                <select id="category" class="w-full p-2 border rounded-md" required>
                    <option value="Emergency">🚨 Medical Emergency</option>
                    <option value="Safety">⚠️ Safety Concern</option>
                    <option value="Harassment">🚫 Harassment</option>
                    <option value="Infrastructure">🛠️ Infrastructure/Hazard</option>
                    <option value="Lost & Found">📦 Lost & Found</option>
                </select>
            </div>
            
            <div class="flex items-center space-x-2 bg-blue-50 p-3 rounded-md">
                <input type="checkbox" id="isAnonymous" class="h-4 w-4">
                <label for="isAnonymous" class="text-sm text-blue-800 font-medium">Report Anonymously</label>
            </div>

            <textarea id="description" placeholder="Describe the incident..." class="w-full p-2 border rounded-md h-24" required></textarea>
            
            <input type="text" id="location" placeholder="Location (e.g., Library 2nd Floor)" class="w-full p-2 border rounded-md" required>
            
            <div>
                <label class="block text-sm font-medium text-gray-700">Urgency Level (1-5)</label>
                <input type="range" id="urgency" min="1" max="5" value="3" class="w-full">
            </div>

            <button type="submit" class="w-full bg-blue-600 text-white py-3 rounded-md font-bold hover:bg-blue-700 transition">Submit Report</button>
        </form>
    </section>

    <section id="admin-page" class="hidden max-w-6xl mx-auto mt-10 p-6">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-2xl font-bold text-gray-800">Admin Response Platform</h2>
            <button onclick="clearData()" class="text-xs text-red-500 underline">Clear All Data</button>
        </div>

        <div class="overflow-x-auto bg-white rounded-xl shadow-md">
            <table class="w-full text-left">
                <thead class="bg-gray-100 border-b">
                    <tr>
                        <th class="p-4">Priority</th>
                        <th class="p-4">Category</th>
                        <th class="p-4">Location</th>
                        <th class="p-4">Status</th>
                        <th class="p-4">Action</th>
                    </tr>
                </thead>
                <tbody id="adminTableBody">
                    </tbody>
            </table>
        </div>
    </section>

    <script>
        // CORE LOGIC: NO DATABASE REQUIRED (Uses LocalStorage)
        const form = document.getElementById('incidentForm');
        
        form.addEventListener('submit', (e) => {
            e.preventDefault();
            
            const newIncident = {
                id: Date.now(),
                category: document.getElementById('category').value,
                description: document.getElementById('description').value,
                location: document.getElementById('location').value,
                urgency: document.getElementById('urgency').value,
                anonymous: document.getElementById('isAnonymous').checked,
                status: 'Open',
                timestamp: new Date().toLocaleString()
            };

            // Intelligent Prioritization Logic 
            let score = parseInt(newIncident.urgency);
            if(newIncident.category === 'Emergency') score += 10;
            if(newIncident.category === 'Harassment') score += 8;
            newIncident.priorityScore = score;

            // Save to "Database" (LocalStorage) 
            const incidents = JSON.parse(localStorage.getItem('incidents') || '[]');
            incidents.push(newIncident);
            localStorage.setItem('incidents', JSON.stringify(incidents));

            alert('Incident Reported Successfully!');
            form.reset();
            showPage('admin');
        });

        function renderAdminTable() {
            const incidents = JSON.parse(localStorage.getItem('incidents') || '[]');
            const tableBody = document.getElementById('adminTableBody');
            
            // Sort by Priority Score (High to Low) [cite: 11]
            incidents.sort((a, b) => b.priorityScore - a.priorityScore);

            tableBody.innerHTML = incidents.map(inc => `
                <tr class="border-b hover:bg-gray-50 ${inc.priorityScore > 12 ? 'bg-red-50' : ''}">
                    <td class="p-4 font-bold text-center">${inc.priorityScore}</td>
                    <td class="p-4">
                        <span class="font-semibold">${inc.category}</span><br>
                        <span class="text-xs text-gray-500">${inc.anonymous ? '👤 Anonymous' : '🆔 Identified'}</span>
                    </td>
                    <td class="p-4 text-sm">${inc.location}</td>
                    <td class="p-4">
                        <span class="px-2 py-1 rounded-full text-xs font-bold 
                            ${inc.status === 'Open' ? 'bg-green-100 text-green-700' : 'bg-yellow-100 text-yellow-700'}">
                            ${inc.status}
                        </span>
                    </td>
                    <td class="p-4 text-sm">
                        <button onclick="updateStatus(${inc.id})" class="text-blue-600 hover:underline">Mark Resolved</button>
                    </td>
                </tr>
            `).join('');
        }

        function updateStatus(id) {
            let incidents = JSON.parse(localStorage.getItem('incidents') || '[]');
            incidents = incidents.map(inc => inc.id === id ? {...inc, status: 'Resolved'} : inc);
            localStorage.setItem('incidents', JSON.stringify(incidents));
            renderAdminTable();
        }

        function showPage(page) {
            document.getElementById('student-page').classList.toggle('hidden', page !== 'student');
            document.getElementById('admin-page').classList.toggle('hidden', page !== 'admin');
            if(page === 'admin') renderAdminTable();
        }

        function clearData() {
            localStorage.removeItem('incidents');
            renderAdminTable();
        }
    </script>
</body>
</html>
